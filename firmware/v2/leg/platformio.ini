[platformio]
; Only the firmware env builds on `pio run`; `native` is for `pio test` only.
default_envs = seeed_xiao_rp2040

[env:seeed_xiao_rp2040]
; arduino-pico (Earle Philhower) core for RP2040. The official PlatformIO
; "raspberrypi" platform only ships the mbed core and a couple of boards, so we
; use the maxgerhardt fork which provides the earlephilhower core and the XIAO
; RP2040 board definition. This core sits directly on the Pico SDK — native
; pico/stdlib.h, hardware/uart.h, hardware/pwm.h etc. are all available.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

; Host (desktop) environment for unit-testing the hardware-independent modules.
; Run with:  pio test -e native
; Compiles only protocol.c (the rest of src/ needs the Pico SDK and is excluded).
[env:native]
platform = native
test_framework = unity
build_src_filter = -<*> +<protocol.c>
